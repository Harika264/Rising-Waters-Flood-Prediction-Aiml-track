<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rising Waters | ML Flood Prediction{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom Style Sheet -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

    <!-- Glass Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass sticky-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom" href="{{ url_for('home') }}">
                <i class="fa-solid fa-droplet text-info-glow"></i>
                <span>RISING WATERS</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom {% if active_page == 'home' %}active{% endif %}" href="{{ url_for('home') }}">
                            <i class="fa-solid fa-chart-line me-1"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom {% if active_page == 'predict' %}active{% endif %}" href="{{ url_for('predict') }}">
                            <i class="fa-solid fa-cloud-showers-heavy me-1"></i> Prediction Panel
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Block -->
    <main class="container my-5">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="py-4 border-top border-glass mt-auto" style="background: rgba(5, 8, 20, 0.95);">
        <div class="container text-center text-secondary">
            <p class="mb-1">&copy; 2026 final-year project: <strong>Rising Waters: A Machine Learning Approach to Flood Prediction</strong></p>
            <p class="small text-muted mb-0">Built with Python, Scikit-Learn, Random Forest, Flask, and IBM Cloud Ready.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS Script -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
